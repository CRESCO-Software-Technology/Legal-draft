# nginx for the self-hosted web tier (docker-compose.selfhost.yml).
#
# Serves the built Vite SPA and reverse-proxies /api to api-service so the
# browser talks to a single origin (no CORS, cookies stay first-party).
server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # API + realtime collab → api-service (internal compose network).
  location /api/ {
    proxy_pass http://api-service:8080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # WebSocket upgrade (Hocuspocus collab).
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 300s;
    client_max_body_size 50m;   # contract uploads
  }

  # SPA fallback — every non-file route serves index.html so client routing works.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Long-cache the hashed asset bundles; never cache index.html.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
}
