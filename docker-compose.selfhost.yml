# draftLegal — self-hosted stack (Wave 4).
#
# The real "your contracts never leave your servers" deployment: infra PLUS the
# api / worker / agents / web services, with secure-by-default config. Unlike
# docker-compose.yml (local dev infra only, weak fixed creds), everything here
# is driven by an env file and nothing is exposed publicly except the web tier.
#
# Quickstart:
#   cp .env.selfhost.example .env.selfhost
#   # edit .env.selfhost — set strong POSTGRES_PASSWORD, MINIO creds, JWT_SECRET
#   # (>=32 chars), PORTAL_JWT_SECRET, INTERNAL_SERVICE_SECRET, AI keys, etc.
#   pnpm --filter web build   # Vite bakes VITE_API_URL at build time (default /api)
#   docker compose --env-file .env.selfhost -f docker-compose.selfhost.yml up -d --build
#
# Only the `web` service publishes a host port (8080). It reverse-proxies /api
# to api-service, so the browser talks to a single origin. Postgres/Redis/ES/
# MinIO/Gotenberg/agents are reachable only on the internal compose network.
#
# Backups + upgrades: see docs/operations/SELF-HOSTING.md.

x-restart: &restart
  restart: unless-stopped

services:
  postgres:
    <<: *restart
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-clm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env.selfhost}
      POSTGRES_DB: ${POSTGRES_DB:-clm}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-clm} -d ${POSTGRES_DB:-clm}']
      interval: 10s
      timeout: 5s
      retries: 5
    # No published port — only the api/worker services reach it internally.

  redis:
    <<: *restart
    image: redis:7-alpine
    command: redis-server --appendonly yes ${REDIS_PASSWORD:+--requirepass ${REDIS_PASSWORD}}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    <<: *restart
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false   # single-node on a private network
      - 'ES_JAVA_OPTS=-Xms512m -Xmx512m'
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:9200/_cluster/health || exit 1']
      interval: 20s
      timeout: 10s
      retries: 5

  minio:
    <<: *restart
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?set MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 10s
      timeout: 5s
      retries: 5

  minio_init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
        mc mb --ignore-existing local/${S3_BUCKET:-clm-documents};
        mc anonymous set none local/${S3_BUCKET:-clm-documents};
        exit 0;
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}

  gotenberg:
    <<: *restart
    image: gotenberg/gotenberg:8
    command: ['gotenberg', '--api-port=3000']
    # Private — only api/worker reach it on the internal network.

  # One-shot: apply pending Prisma migrations before the API/worker start.
  migrate:
    image: draftlegal-api:selfhost
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
    working_dir: /app/apps/api
    entrypoint: ['node', '--import', 'tsx']
    command: ['node_modules/.bin/prisma', 'migrate', 'deploy']
    restart: 'no'

  api-service:
    <<: *restart
    image: draftlegal-api:selfhost
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 8080
      # Dedicated worker-service runs the BullMQ workers — the API must not
      # also consume jobs.
      WORKERS_ENABLED: 'false'
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      ELASTICSEARCH_URL: http://elasticsearch:9200
      GOTENBERG_URL: http://gotenberg:3000
      AGENTS_URL: http://agents-service:8080
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: ${S3_BUCKET:-clm-documents}
      S3_ACCESS_KEY: ${MINIO_ROOT_USER}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      S3_FORCE_PATH_STYLE: 'true'
      JWT_SECRET: ${JWT_SECRET:?set a strong JWT_SECRET (>=32 chars)}
      PORTAL_JWT_SECRET: ${PORTAL_JWT_SECRET:?set PORTAL_JWT_SECRET}
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET:?set INTERNAL_SERVICE_SECRET}
      AI_KEY_ENCRYPTION_KEY: ${AI_KEY_ENCRYPTION_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}

  worker-service:
    <<: *restart
    image: draftlegal-api:selfhost
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    working_dir: /app/apps/api
    command: ['node', '--import', 'tsx', 'src/worker-entrypoint.ts']
    environment:
      NODE_ENV: production
      PORT: 8080
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      ELASTICSEARCH_URL: http://elasticsearch:9200
      AGENTS_URL: http://agents-service:8080
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: ${S3_BUCKET:-clm-documents}
      S3_ACCESS_KEY: ${MINIO_ROOT_USER}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      S3_FORCE_PATH_STYLE: 'true'
      JWT_SECRET: ${JWT_SECRET}
      PORTAL_JWT_SECRET: ${PORTAL_JWT_SECRET}
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}

  agents-service:
    <<: *restart
    image: draftlegal-agents:selfhost
    build:
      context: ./apps/agents
      dockerfile: Dockerfile
    depends_on:
      redis:
        condition: service_healthy
    environment:
      PORT: 8080
      API_URL: http://api-service:8080
      REDIS_URL: ${REDIS_URL}
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}

  web:
    <<: *restart
    image: nginx:1.27-alpine
    depends_on:
      - api-service
    ports:
      - '${WEB_PORT:-8080}:80'
    volumes:
      - ./apps/web/dist:/usr/share/nginx/html:ro
      - ./deploy/selfhost/nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:
  redis_data:
  elasticsearch_data:
  minio_data:
