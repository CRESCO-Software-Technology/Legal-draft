# Non-secret env vars for api-service. Copy to env.api.yaml and fill in.
# Secrets (DATABASE_URL, JWT_SECRET, etc.) come from Secret Manager via --set-secrets.

NODE_ENV: production
HOST: 0.0.0.0

# Disable the Hocuspocus collab WebSocket (Cloud Run is single-port).
COLLAB_DISABLED: "1"

# Public-facing URLs.
FRONTEND_URL: https://draftlegal-prod-13353.web.app

# Internal service URLs (filled in after first agents + gotenberg deploys; the
# Cloud Run console shows them, format: https://<name>-<hash>-<region>.a.run.app).
AGENTS_URL: https://agents-service-611770954192.us-central1.run.app
GOTENBERG_URL: https://gotenberg-611770954192.us-central1.run.app

# Object storage — GCS via S3-compat interop.
S3_ENDPOINT: https://storage.googleapis.com
S3_BUCKET: draftlegal-documents-213565
S3_REGION: auto
S3_FORCE_PATH_STYLE: "true"

# Email
EMAIL_FROM: noreply@draftlegal-prod-13353.web.app

# Feature flags
ENABLE_SIGNUP: "true"

# LLM observability (optional — leave blank if not using Langfuse)
LANGFUSE_HOST: https://cloud.langfuse.com
