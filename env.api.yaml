# Non-secret env vars for api-service. Copy to env.api.yaml and fill in.
# Secrets (DATABASE_URL, JWT_SECRET, etc.) come from Secret Manager via --set-secrets.

NODE_ENV: production
HOST: 0.0.0.0

# Disable the Hocuspocus collab WebSocket (Cloud Run is single-port).
COLLAB_DISABLED: "1"

# Public-facing URLs.
FRONTEND_URL: https://draftlegal-prod-13353.web.app

# Internal service URLs (filled in after first agents + gotenberg deploys; the
# Cloud Run console shows them, format: https://<name>-<hash>-<region>.a.run.app).
AGENTS_URL: https://agents-service-611770954192.us-central1.run.app
GOTENBERG_URL: https://gotenberg-611770954192.us-central1.run.app

# Object storage — GCS via S3-compat interop.
S3_ENDPOINT: https://storage.googleapis.com
S3_BUCKET: draftlegal-documents-213565
S3_REGION: auto
S3_FORCE_PATH_STYLE: "true"

# Email (SMTP / nodemailer). Email ONLY sends once SMTP_HOST is set below.
# Uncomment + point these at your SMTP relay (SendGrid / SES / Postmark / …).
# SMTP_USER + SMTP_PASS are secrets → add them via --set-secrets from Secret
# Manager, NOT in this file.
# SMTP_HOST: smtp.sendgrid.net
# SMTP_PORT: "587"
# SMTP_SECURE: "false"
SMTP_FROM: noreply@draftlegal-prod-13353.web.app
EMAIL_FROM: noreply@draftlegal-prod-13353.web.app

# Public web base URL — builds signing links in emails (no trailing slash).
WEB_BASE_URL: https://draftlegal-prod-13353.web.app

# Inbound email (optional) — counterparty replies with a marked-up PDF/DOCX and
# it lands as a new contract version. Requires a provider inbound-parse webhook
# posting to /api/v1/inbound/email plus MX records for the domain. Uncomment
# once that is set up; INBOUND_EMAIL_SECRET goes in via --set-secrets.
# Left unset means outbound share emails do not invite a reply, which is
# correct while nothing is listening on that address.
# INBOUND_EMAIL_DOMAIN: inbound.draft-legal.com

# Feature flags
ENABLE_SIGNUP: "true"

# LLM observability (optional — leave blank if not using Langfuse)
LANGFUSE_HOST: https://cloud.langfuse.com
