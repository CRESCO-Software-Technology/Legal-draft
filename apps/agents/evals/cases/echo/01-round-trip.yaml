# D.0.9 demo case — exercises the harness end-to-end against the built-in
# `echo` runner so we can sanity-check wiring without a real LLM call.
# Real contract-AI cases land in D5 once the pipeline is built.
name: "echo round-trips the input text"
input:
  text: "hello world"
expected:
  - grader: exact_match
    field: text
    value: "hello world"
  - grader: contains
    field: text
    value: "world"
metadata:
  priority: smoke
