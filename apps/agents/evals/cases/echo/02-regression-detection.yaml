# Demonstrates what a regression looks like: the grader expects "greeting"
# but the echo runner returns "hello world" — so this case FAILS.
# Uncomment to see the harness flag a regression, or leave as documentation.
# Currently passes because we assert the literal string the runner returns;
# flip `value:` below to "greeting" to simulate a regression.
name: "contains-check catches the right substring"
input:
  text: "hello world"
expected:
  - grader: contains
    field: text
    value: "hello"
metadata:
  priority: smoke
