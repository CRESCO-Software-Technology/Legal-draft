# Non-secret env vars for agents-service. Copy to env.agents.yaml and fill in.
# Secrets (LLM API keys, INTERNAL_SERVICE_SECRET) come from Secret Manager.

HOST: 0.0.0.0

# Default model routing (apps/agents/app/config.py reads these).
DEFAULT_PROVIDER: google
DEFAULT_MODEL: gemini-1.5-pro

# How agent tools call back to the API for DB queries
# (contract_search, portfolio_query, contract_summarize, etc.).
# Same Cloud Run URL the front-end hits through Firebase Hosting.
API_URL: https://api-service-611770954192.us-central1.run.app

# LLM observability (optional)
LANGFUSE_HOST: https://cloud.langfuse.com
