name: ✨ Feature request
description: Suggest an idea or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea! For larger features, consider opening a
        [Discussion](https://github.com/AniketTati/draft-legal/discussions) first
        so we can shape it together before any code is written.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Start with the pain, not the solution. What can't you do today?
      placeholder: When I review a contract, there's no way to compare it against a previous version side by side.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see? Rough is fine.
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Which part of the app?
      options:
        - "Web / frontend"
        - "API"
        - "Agents / AI"
        - "New integration (Slack, Drive, etc.)"
        - "Self-hosting / deployment"
        - "Other / not sure"
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds you're using today, or other approaches you thought about.

  - type: checkboxes
    id: contribute
    attributes:
      label: Would you like to build it?
      options:
        - label: I'd be willing to open a PR for this (we'll help you get started)
