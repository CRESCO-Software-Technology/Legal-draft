name: CLA Assistant

# Asks first-time contributors to sign the CLA (CLA.md) by commenting on their
# PR, and records the signature in this repo. Fully self-contained — no
# third-party service. Free for public repos.
#
# ONE-TIME SETUP (maintainer):
#   1. Create a Personal Access Token (classic) with the `repo` scope:
#        GitHub → Settings → Developer settings → Personal access tokens
#   2. Add it as a repo secret named CLA_PERSONAL_ACCESS_TOKEN:
#        Repo → Settings → Secrets and variables → Actions → New repository secret
#   That's it. Signatures are stored at signatures/version1/cla.json on a
#   `cla-signatures` branch this action manages automatically.

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        if: >
          (github.event.comment.body == 'recheck'
            || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA')
          || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Required: a PAT with `repo` scope so the action can store signatures.
          PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_PERSONAL_ACCESS_TOKEN }}
        with:
          path-to-signatures: 'signatures/version1/cla.json'
          path-to-document: 'https://github.com/AniketTati/draft-legal/blob/main/CLA.md'
          branch: 'cla-signatures'
          allowlist: AniketTati,dependabot[bot],bot*
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-notsigned-prcomment: >
            Thanks for your pull request! Before we can merge it, we need you to
            sign our [Contributor License Agreement](https://github.com/AniketTati/draft-legal/blob/main/CLA.md).
            You keep the copyright to your work — this just lets the project stay
            both open-source and sustainable. To sign, simply add a comment below
            with exactly this text:
