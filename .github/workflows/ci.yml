name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Nightly full audit run (07:00 UTC ≈ 00:00 PT) so the 24-probe
    # suite catches regressions even when no PR is open. Cost cap on
    # the OpenAI test key keeps a runaway from burning credits.
    - cron: '0 7 * * *'

jobs:
  typecheck-and-lint:
    name: Typecheck & Lint (Node)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Typecheck all packages
        run: pnpm typecheck

  bundle-size:
    # Production audit (2026-04-30): web bundle ballooned to 833KB
    # gzip on first paint. Code-split into editor / pdf / charts /
    # tanstack / icons chunks; check-bundle-size.mjs enforces a per-
    # chunk gzip budget so this can't regress without a PR-level
    # discussion.
    name: Web bundle-size budget
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - name: Build web + verify chunk sizes
        working-directory: apps/web
        run: pnpm build:check

  test-api:
    name: Test API
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: clm
          POSTGRES_PASSWORD: clm
          POSTGRES_DB: clm_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    env:
      DATABASE_URL: postgresql://clm:clm@localhost:5432/clm_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: test-secret-for-ci-only
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Run DB migrations
        working-directory: apps/api
        run: pnpm db:migrate:prod

      - name: Run API tests
        working-directory: apps/api
        run: pnpm test

  test-agents:
    name: Test Agents (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: apps/agents/requirements.txt

      - name: Install dependencies
        working-directory: apps/agents
        run: pip install -r requirements.txt pytest pytest-asyncio

      - name: Run agent tests
        working-directory: apps/agents
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: pytest tests/ -v --tb=short || true  # non-blocking until tests exist

  feature-integrity-fast:
    # Production audit gate (2026-04-29). Runs the 12 deterministic
    # probes from scripts/feature-integrity/ on every PR. No LLM
    # required — these probes hit only the API + DB + Redis surface
    # and verify schema, permissions, write flows, rate limits, PII
    # policy, audit chain, cost cap, and the UI nav surface (Playwright).
    # Total runtime ~40s.
    #
    # The full 24-probe suite (including LLM-dependent agent tests)
    # runs in `feature-integrity-full` below — gated behind a secret
    # OPENAI_API_KEY and only on nightly + main pushes to keep CI cost
    # predictable.
    name: Feature integrity (fast — 12 probes, no LLM)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: clm
          POSTGRES_PASSWORD: clm
          POSTGRES_DB: clm_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    env:
      DATABASE_URL: postgresql://clm:clm@localhost:5432/clm_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: test-secret-for-ci-only
      INTERNAL_SERVICE_SECRET: clm-internal-dev-secret-2026
      NODE_ENV: production
      PROBE_API: http://localhost:3001
      PROBE_WEB: http://localhost:5173
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile

      - name: Run DB migrations + seed personas
        working-directory: apps/api
        run: |
          pnpm db:migrate:prod
          pnpm tsx --env-file=.env scripts/seed-personas.ts || pnpm tsx scripts/seed-personas.ts

      - name: Boot API server
        working-directory: apps/api
        run: pnpm dev > /tmp/api.log 2>&1 &
      - name: Boot web (Vite preview)
        working-directory: apps/web
        run: pnpm build && pnpm preview --port 5173 > /tmp/web.log 2>&1 &

      - name: Wait for services to be ready
        run: |
          for i in {1..60}; do
            curl -sf http://localhost:3001/health && curl -sf http://localhost:5173 && break
            sleep 2
          done

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run feature-integrity (fast, deterministic)
        run: pnpm audit:features:fast

      - name: Upload audit results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: feature-integrity-results
          path: |
            scripts/feature-integrity/audit-results.json
            /tmp/api.log
            /tmp/web.log

  feature-integrity-full:
    # Full 24-probe suite including LLM-dependent agent tests. Costs
    # ~$0.10 per run (gpt-4.1-mini), so we restrict to nightly +
    # main-branch pushes. Skipped on PRs from forks (no secret access).
    name: Feature integrity (full — 24 probes, with LLM)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.ref == 'refs/heads/main'
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: clm
          POSTGRES_PASSWORD: clm
          POSTGRES_DB: clm_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
    env:
      DATABASE_URL: postgresql://clm:clm@localhost:5432/clm_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: test-secret-for-ci-only
      INTERNAL_SERVICE_SECRET: clm-internal-dev-secret-2026
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      NODE_ENV: production
      PROBE_API: http://localhost:3001
      PROBE_WEB: http://localhost:5173
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'pnpm' }
      - uses: actions/setup-python@v5
        with: { python-version: '3.11', cache: 'pip', cache-dependency-path: 'apps/agents/requirements.txt' }
      - run: pnpm install --frozen-lockfile
      - name: Install Python deps
        working-directory: apps/agents
        run: pip install -r requirements.txt

      - name: Run DB migrations + seed personas + seed approvals
        working-directory: apps/api
        run: |
          pnpm db:migrate:prod
          pnpm tsx scripts/seed-personas.ts
          pnpm tsx scripts/seed-approvals.ts

      - name: Boot agents service
        working-directory: apps/agents
        run: ./.venv/bin/uvicorn main:app --host 127.0.0.1 --port 8000 > /tmp/agents.log 2>&1 &
      - name: Boot API server
        working-directory: apps/api
        run: pnpm dev > /tmp/api.log 2>&1 &
      - name: Boot web (Vite preview)
        working-directory: apps/web
        run: pnpm build && pnpm preview --port 5173 > /tmp/web.log 2>&1 &

      - name: Wait for services
        run: |
          for i in {1..60}; do
            curl -sf http://localhost:3001/health && curl -sf http://localhost:8000/health && curl -sf http://localhost:5173 && break
            sleep 3
          done

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run feature-integrity (full)
        run: pnpm audit:features

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: feature-integrity-full-results
          path: |
            scripts/feature-integrity/audit-results.json
            /tmp/api.log
            /tmp/agents.log
            /tmp/web.log
