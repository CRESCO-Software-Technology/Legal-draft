name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  typecheck-and-lint:
    name: Typecheck (Node)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # pnpm version comes from the root package.json "packageManager"
      # field — do NOT also pin it here or action-setup errors with
      # "Multiple versions of pnpm specified".
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      # pnpm v9 does not run dependency postinstall scripts by default, so the
      # Prisma client is never generated on install. apps/api's tsc needs the
      # generated client's types, so generate it explicitly before typecheck.
      - name: Generate Prisma client
        run: pnpm --filter api db:generate

      - name: Typecheck all packages
        run: pnpm typecheck

  bundle-size:
    # Production audit (2026-04-30): web bundle ballooned to 833KB
    # gzip on first paint. Code-split into editor / pdf / charts /
    # tanstack / icons chunks; check-bundle-size.mjs enforces a per-
    # chunk gzip budget so this can't regress without a PR-level
    # discussion.
    name: Web bundle-size budget
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - name: Build web + verify chunk sizes
        working-directory: apps/web
        run: pnpm build:check

  test-api:
    name: Test API
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: clm
          POSTGRES_PASSWORD: clm
          POSTGRES_DB: clm_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    env:
      DATABASE_URL: postgresql://clm:clm@localhost:5432/clm_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: test-secret-for-ci-only
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      # pnpm v9 skips dependency postinstall scripts, so generate the Prisma
      # client explicitly — the tests import @prisma/client at module load.
      - name: Generate Prisma client
        working-directory: apps/api
        run: pnpm db:generate

      - name: Run DB migrations
        working-directory: apps/api
        run: pnpm db:migrate:prod

      - name: Run API tests
        working-directory: apps/api
        run: pnpm test

  test-agents:
    name: Test Agents (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: apps/agents/requirements.txt

      - name: Install dependencies
        working-directory: apps/agents
        run: pip install -r requirements.txt pytest pytest-asyncio

      - name: Run agent tests
        working-directory: apps/agents
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: pytest tests/ -v --tb=short || true  # non-blocking until Wave 5 lands real agent tests
